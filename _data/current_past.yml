- speaker: Clément Bonet
  date: April 7th
  time: 2pm
  affiliation: CMAP, École Polytechnique
  url: https://clbonet.github.io/
  title: "Busemann Functions in the Wasserstein Space: Existence, Closed-Forms, and Applications to Slicing"
  abstract: "The Busemann function has recently found much interest in a variety of geometric machine learning problems, as it naturally defines projections onto geodesic rays of Riemannian manifolds and generalizes the notion of hyperplanes. As several sources of data can be conveniently modeled as probability distributions, it is natural to study this function in the Wasserstein space, which carries a rich formal Riemannian structure induced by Optimal Transport metrics. In this work, we investigate the existence and computation of Busemann functions in Wasserstein space, which admits geodesic rays. We establish closed-form expressions in two important cases: one-dimensional distributions and Gaussian measures. These results enable explicit projection schemes for probability distributions on $mathbb{R}$, which in turn allow us to define novel Sliced-Wasserstein distances over Gaussian mixtures and labeled datasets. We demonstrate the efficiency of those original schemes on synthetic datasets as well as transfer learning problems."
  room: Room Yvette Cauchoix (Perrin building)
  
- speaker: Louis Hauseux
  date: April 7th
  time: 3pm
  affiliation: INRIA
  url: 
  title: "From Statistics to Graphs: Hierarchical Clustering for Image Analysis"
  abstract: "This talk bridges statistical theory and practical image processing. We begin by defining clustering as the recovery of high-density level sets from a statistical distribution in the Euclidean space. We show how to solve this problem efficiently using geometric (hyper)graphs, providing a theoretical foundation for hierarchical methods like HDBSCAN through percolation theory. Finally, we view images as graphs and demonstrate how to hack the hierarchical clustering extraction by customizing loss functions. We illustrate this approach with two applications: automatic fault detection in 2D images and unsupervized instance segmentation on 3D LiDAR point clouds."
  room: Room Yvette Cauchoix (Perrin building)

- speaker: Nelly Pustelnik
  date: March 10th
  time: 2pm
  affiliation: CNRS, ENS Lyon
  url: https://perso.ens-lyon.fr/nelly.pustelnik/
  title: "ReTune: Restarted Truncated unrolled networks to bridge the gap between Plug-and-Play and Unfolded Neural Networks for image restoration"
  abstract: "In recent years, deep learning methods have transformed the field of image restoration, achieving significantly higher reconstruction quality than traditional variational approaches. Many current strategies combine principles from both variational models and neural networks, forming what are known as model-based neural networks. Among these, two main frameworks stand out: Unfolded neural networks and Plug-and-Play (PnP) methods.
Unfolded networks emulate the iterations of proximal algorithms (also referred to as unrolled algorithms, e.g., unrolled forward–backward) to create task-specific end-to-end architectures, while PnP methods rely on pretrained denoisers to solve reconstruction problems without additional training. However, automatic differentiation in unfolded networks requires relatively shallow architectures (a small number of unrolled iterations) due to computational constraints, whereas PnP methods, though theoretically convergent, must be iterated until convergence and often underperform unfolded approaches. <br/>
This work focuses on a specific training procedure for unfolded neural networks that still uses automatic differentiation while maintaining theoretical convergence guarantees. More precisely, our analysis shows that an unfolded neural network can be restarted to infer solutions of a variational problem with fixed parameters. Furthermore, we introduce the ReTune (Restarted Truncated unrolled networks) procedure to estimate the underlying parameters in a simple fashion, building on theoretical developments inspired by bi-level literature (Deep Equilibrium,Jacobian-free propagation).
A deeper analysis is provided in the context of unrolled forward–backward iterations to highlight the interplay between the network depth and the number of restarts in ReTune, based on the Lipschitz properties of the algorithmic scheme. In particular, the depth controls the approximation error of a Jacobian-free step, whereas restarting the unrolled neural network allows one to reach the equilibrium point.
This theoretical analysis is supported by numerical experiments showing that the proposed ReTune procedure goes beyond traditional learning schemes, improves performance compared to PnP strategies, and provides stronger guarantees than standard unfolded approaches."
  room: Room Yvette Cauchoix (Perrin building)
  
- speaker: Nicolas Papadakis
  date: March 10th
  time: 3pm
  affiliation: Institut de Mathématiques de Bordeaux
  url: 
  title: "Posterior Sampling with the Proximal Stochastic Gradient Langevin Algorithm"
  abstract: "We investigate the challenge of sampling from distributions defined by non-convex potentials using the Unadjusted Langevin Algorithm (ULA). Our analysis establishes the stability of the discrete-time ULA under drift approximations, provided the potential is non-convex and strongly convex at infinity. 
To this end, we focus on the Proximal Stochastic Gradient Langevin Algorithm (PSGLA), which integrates the forward-backward optimization framework with a ULA step. By leveraging our stability results and properties of the Moreau envelope, we present the first convergence proof for PSGLA in the context of non-convex potentials. We validate our theoretical findings empirically using synthetic data and real-world imaging inverse problems. Our experiments illustrate that PSGLA not only preserves the restoration quality of posterior sampling but also achieves faster convergence rates compared to the standard Stochastic Gradient Langevin Algorithm."
  room: Room Yvette Cauchoix (Perrin building)

- speaker: Ali Joundi
  date: February 3rd
  time: 2pm (moved from 3pm to 2pm due to cancellation of the other talk)
  affiliation: Institut de Mathématiques de Bordeaux
  url: 
  title: "Stochastic Orthogonal Regularization for deep projective priors"
  abstract: "Many crucial tasks in image processing and computer vision are formulated as inverse problems. Therefore, it is of great importance to design efficient and robust algorithms to solve these problems. In this paper, we focus on generalized projected gradient descent (GPGD) algorithms where generalized projections are realized with learned neural networks as they provide state-of-the-art results for imaging inverse problems. Indeed, neural networks allow for projections onto unknown low-dimensional sets that model complex data, such as images. We call these projections deep projective priors. In generic settings, when the orthogonal projection onto a low-dimensional model set is used, it has been shown, under a restricted isometry assumption, that the corresponding orthogonal PGD converges with a linear rate, yielding near-optimal convergence (within the class of GPGD methods) in the classical case of sparse recovery. However, for deep projective priors trained with classical mean squared error losses, there is little guarantee that the hypotheses for linear convergence are satisfied. In this paper, we propose a stochastic orthogonal regularization of the training loss for deep projective priors. This regularization is motivated by our theoretical results: a sufficiently good approximation of the orthogonal projection guarantees linear stable recovery with performance close to orthogonal PGD. We show experimentally, using two different deep projective priors (based on autoencoders and on denoising networks), that our stochastic orthogonal regularization yields projections that improve convergence speed and robustness of GPGD in challenging inverse problem settings, in accordance with our theoretical findings.  <br/> The talk will be given in French."
  room: Room Yvette Cauchoix (Perrin building)

- speaker: Samuel Hurault
  date: December 2nd
  time: 2pm
  affiliation: CNRS, LIGM
  url: https://samuelhurault.netlify.app/
  title: "From Score Matching to Diffusion: a fine-grained error analysis in the Gaussian setting"
  abstract: "Sampling from an unknown distribution, accessible only through discrete samples, is a fundamental problem at the core of generative AI. The current state-of-the-art methods follow a two-step process: first, estimating the score function (the gradient of a smoothed log-distribution) and then applying a diffusion-based sampling algorithm. The resulting distribution's correctness can be impacted by three major factors: the generalization and optimization errors in score matching, and the discretization error in the diffusion. In this paper we provide, in the Gaussian setting, the exact Wasserstein sampling error that arises from these four error sources. This allows us to rigorously track how the anisotropy of the data distribution (encoded by its power spectrum) interacts with key parameters of the end-to-end sampling method."
  room: Room Yvette Cauchoix (Perrin building)
  
- speaker: Nils Laurent
  date: December 2nd
  time: 3pm
  affiliation: LASPI Roanne
  url: https://nils-laurent.github.io/
  title: "Restauration d'Images par Algorithme Plug-and-Play Multiniveaux"
  abstract: "Les algorithmes de reconstruction d'images Plug-and-Play (PnP) sont fondés sur des réseaux de neurones profonds débruiteurs et utilisés comme a priori pour la résolution de problèmes inverses. Malgré leur flexibilité, les algorithmes PnP requièrent un large nombre d'itérations pour converger et leur performance est sensible au choix de l'initialisation et des hyperparamètres. Dans cette présentation, nous considérons un nouvel algorithme PnP multiniveaux qui accélère la convergence en combinant des itérations faites à différentes échelles et améliore la robustesse à l'initialisation ainsi qu'aux hyperparamètres grâce à une stratégie exploitant les échelles plus grossières pour la résolution aux échelles fines. Nous pourrons observer par une série d'expériences numériques incluant le dématriçage et l'inpainting que cette nouvelle méthode est plus rapide et donne de meilleures reconstructions que d'autres algorithmes PnP états-de-l'art."
  room: Room Yvette Cauchoix (Perrin building)


- speaker: Kimia Nadjahi
  date: November 4th
  time: 2pm
  affiliation: CNRS, ENS PARIS
  url: https://kimiandj.github.io/
  title: "Optimal Transport-based Conformal Prediction"
  abstract: "Conformal Prediction (CP) is a principled framework for quantifying uncertainty in blackbox learning models, by constructing prediction sets with finite-sample coverage guarantees. Traditional approaches rely on scalar nonconformity scores, which fail to fully exploit the geometric structure of multivariate outputs, such as in multi-output regression or multiclass classification. Recent methods addressing this limitation impose predefined convex shapes for the prediction sets, potentially misaligning with the intrinsic data geometry. We introduce a novel CP procedure handling multivariate score functions through the lens of optimal transport. Specifically, we leverage Monge-Kantorovich vector ranks and quantiles to construct prediction regions with flexible, potentially non-convex shapes, better suited to the complex uncertainty patterns encountered in multivariate learning tasks. We prove that our approach ensures finite-sample, distribution-free coverage properties, similar to typical CP methods. We then adapt our method for multi-output regression and multiclass classification, and also propose simple adjustments to generate adaptive prediction regions with asymptotic conditional coverage guarantees. Finally, we evaluate our method on practical regression and classification problems, illustrating its advantages in terms of (conditional) coverage and efficiency. This is joint work with Gauthier Thurin (CNRS, ENS Paris) and Claire Boyer (Université Paris-Saclay)."
  room: Amphi Darboux (Borel building)

- speaker: Laetitia Chapel 
  date: November 4th
  time: 3pm
  affiliation: Institut Agro Rennes-Angers, IRISA
  url: https://people.irisa.fr/Laetitia.Chapel/
  title: "Sliced optimal transport plans with an application to conditional flow matching"
  abstract: "Optimal Transport (OT) has emerged as a fundamental tool in modern machine learning, mainly due to its ability to provide meaningful comparisons between probability distributions. One of the key strengths of OT is its dual nature: it not only introduces a mathematically rigorous framework defining Wasserstein distances but also constructs an optimal coupling (or transport plan) between distributions. This coupling reveals explicit correspondences between samples, enabling a broad spectrum of applications. Despite the numerous successes of optimal transport in machine learning and the availability of many tools to approximate Wasserstein distances, computing OT plans remains computationally challenging. 
In this talk, I will present a new methodology to efficiently approximate sliced OT plans. The formulation can be recast as a bilevel optimization problem, and I will propose a differentiable generalized approximation that can be further adapted to data residing on manifolds. Finally, I will demonstrate the practical value of this approach by introducing a novel sliced OT-based conditional flow matching method for image generation, an application where fast computation of transport plans is crucial."
  room: Amphi Darboux (Borel building)
  
- speaker: Raphaël Achddou
  date: October 7th
  time: 2pm
  affiliation: ESIEE Paris, LIGM
  url: 
  title: "Synthetic training of deep image restoration networks : principles and applications"
  abstract: " Neural Networks have surpassed traditional prior-based approaches in solving inverse problems, but their black-box nature hinders their interpretability and confidence. To address these issues, a potential approach is to synthesize training images with controlled statistical properties. 
In this talk, I’ll present how a simple occlusion-based image model called the Dead Leaves model can be used to generate high-quality training data for various image restoration tasks. I’ll then show how this model can be adapted to incorporate essential image properties like texture, depth, and complex object geometry. The resulting trained restoration models perform similarly to those trained on real images while offering additional benefits, such as insightful ablation studies, inherent invariance properties, and faster convergence, which I’ll discuss further."
  room: Room Pierre Grisvard (Borel building)


